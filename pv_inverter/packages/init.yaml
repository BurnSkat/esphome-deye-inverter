substitutions:
  update_interval: 10s

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_description}

esp32:
  board: esp32-s2-saola-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "Yb9UXfmHogl+5r4mHuVG+iU+VGPkZE6nSYV1vfhGGJ8="

ota:
  - platform: esphome
    password: "685ec1f8a89c006d3fb1cfb6ee1da4f8"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Deyeesp32 Fallback Hotspot"
    password: "JT2kuDZF1Wbr"

  manual_ip:
    static_ip: 192.168.178.59
    gateway: 192.168.178.1
    subnet: 255.255.255.0

captive_portal:

uart:
  id: mod_bus
  tx_pin: 5
  rx_pin: 16
  baud_rate: 9600
  stop_bits: 1

modbus:
  id: modbus1

modbus_controller:
  - id: ${modbus_controller_id}
    address: 0x1
    modbus_id: modbus1
    setup_priority: -10

debug:
  update_interval: 60s

sensor:
  - platform: wifi_signal
    name: "ESP WiFi Signal"
    id: esp_wifi_signal
    icon: mdi:wifi
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: ESP Uptime
    id: esp_uptime
    type: seconds
    icon: mdi:timer-check
    update_interval: 60s
    entity_category: diagnostic
  - platform: debug
    free:
      name: ESP Heap Free
      id: esp_heap_free
      icon: mdi:memory
      entity_category: diagnostic
    block:
      name: ESP Heap Max Block
      id: esp_heap_max_block
      icon: mdi:memory
      entity_category: diagnostic
    loop_time:
      name: ESP Loop Time
      id: esp_loop_time
      icon: mdi:reload
      entity_category: diagnostic
    cpu_frequency:
      name: ESP CPU Frequency
      id: esp_cpu_frequency
      icon: mdi:cpu-32-bit
      unit_of_measurement: "MHz"
      filters:
        - multiply: 0.000001
      entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ESP IP Address
      id: esp_ip_address
      icon: mdi:ip-network
      entity_category: diagnostic
    ssid:
      name: ESP WiFi SSID
      id: esp_wifi_ssid
      icon: mdi:access-point
      entity_category: diagnostic
    mac_address:
      name: ESP Mac Address
      id: esp_mac_address
      icon: mdi:expansion-card
      entity_category: diagnostic
