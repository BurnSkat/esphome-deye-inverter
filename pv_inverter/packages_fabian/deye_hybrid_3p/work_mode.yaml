select:
  - platform: modbus_controller
    id: energy_management_priority
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "${device_type}-Energy priority"
    address: 141
    value_type: U_WORD
    optionsmap:
      "Battery first": 0
      "Load first": 1

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    id: system_work_mode
    name: "${device_type}-Limit control mode"
    address: 142
    value_type: U_WORD
    optionsmap:
      "Selling first": 0
      "Zero export to load": 1
      "Zero export to CT": 2

switch:
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    register_type: holding
    name: "${device_type}-Load Priority"
    bitmask: 1
    address: 141

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "${device_type}-Solar Sell"
    id: switch_solar_sell
    register_type: holding
    address: 145
    bitmask: 1

number:
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    id: max_sell_power
    name: "${device_type}-Max Solar Sell Power"
    unit_of_measurement: W
    device_class: power
    min_value: 0
    step: 1
    address: 143
    value_type: U_WORD
    mode: box

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "${device_type}-Max Solar Power"
    id: max_solar_power
    unit_of_measurement: W
    device_class: power
    min_value: 0
    step: 1
    address: 340
    value_type: U_WORD
    mode: box

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "${device_type}-Zero Export Power"
    id: zero_export_power
    address: 104
    unit_of_measurement: "W"
    device_class: power
    value_type: U_WORD
    min_value: 20
    max_value: 500
    step: 1
    mode: box
