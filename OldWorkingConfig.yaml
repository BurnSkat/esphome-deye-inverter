substitutions:
  name: deyeesp32                                                     #name in ESPhome
  device_description: "Esphome component for Deye sun-12k-sg04lp3"   #Description in ESPhome
  modbus_controller_id: sg1334p                                      #just a random name for the modbus controler
  device_type: deye                                                #all entities in Home Assistant will start with this text to help identify the entitys 

esphome:
  name: deyeesp32
  friendly_name: DeyeESP32

esp32:
  board: esp32-s2-saola-1
  cpu_frequency: 240MHz
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key_deye

ota:
  - platform: esphome
    password: !secret ota_password_deye

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Deyeesp32 Fallback Hotspot"
    password: !secret fallback_password_deye

  manual_ip:
    static_ip: 192.168.178.59  # Replace with your desired static IP
    gateway: 192.168.178.1       # Your network's gateway
    subnet: 255.255.255.0      # Your network's subnet

captive_portal:

uart:
  id: mod_bus
  tx_pin: 5
  rx_pin: 16
  baud_rate: 9600
  stop_bits: 1
 
modbus:
  id: modbus1
# flow_control_pin: 4 #for use when you use a rs485 board without auto flow control. Like the rs485 max board.
 
modbus_controller:
  - id: ${modbus_controller_id}
    address: 0x1
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 5sec
 
text_sensor:
   - platform: modbus_controller
     modbus_controller_id: ${modbus_controller_id}
     skip_updates: 2
     id: ${device_type}_Running_Status
     bitmask: 0
     register_type: holding
     address: 500
     raw_encode: HEXBYTES
     name: ${device_type}-Running Status
     lambda: |-
       uint16_t value = modbus_controller::word_from_hex_str(x, 0);
       switch (value) {
         case 0: return std::string("standby");
         case 1: return std::string("selfcheck");
         case 2: return std::string("normal");
         case 3: return std::string("alarm");
         case 4: return std::string("fault");
         default: return std::string("----");
       }
       return x;

number:
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    id: ${device_type}_Maximum_battery_charge_current
    name: "${device_type}-Maximum battery charge current"
    address: 108
    unit_of_measurement: A
    value_type: U_WORD
    
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    id: ${device_type}_Maximum_battery_discharge_current
    name: "${device_type}-Maximum battery discharge current"
    address: 109
    unit_of_measurement: A
    value_type: U_WORD

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    id: ${device_type}_Maximum_battery_grid_charge_current
    name: "${device_type}-Maximum battery_grid charge current"
    address: 128
    unit_of_measurement: A
    value_type: U_WORD

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    id: ${device_type}_max_solar_sell_power
    name: "${device_type}-Max Solar Sell Power"
    unit_of_measurement: W
    address: 143
    value_type: U_WORD

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    id: ${device_type}_max_solar_power
    name: "${device_type}-Max Solar Power"
    unit_of_measurement: W
    address: 340
    value_type: U_WORD

